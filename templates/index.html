<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>House Price Prediction</h1>

    <input type="number" id="OverallQual" placeholder="Overall Quality">

    <input type="number" id="GrLivArea" placeholder="Living Area">

    <input type="number" id="GarageCars" placeholder="Garage Cars">

    <input type="number" id="GarageArea" placeholder="Garage Area">

    <input type="number" id="TotalBsmtSF" placeholder="Basement Area">

    <input type="number" id="1stFlrSF" placeholder="1st Floor Area">

    <input type="number" id="FullBath" placeholder="Full Baths">

    <input type="number" id="TotRmsAbvGrd" placeholder="Total Rooms">

    <select id="MSZoning">
        <option value="RL">RL</option>
        <option value="RM">RM</option>
    </select>

    <select id="Utilities">
        <option value="AllPub">AllPub</option>
    </select>

    <select id="BldgType">
        <option value="1Fam">1Fam</option>
        <option value="Duplex">Duplex</option>
    </select>

    <select id="Heating">
        <option value="GasA">GasA</option>
    </select>

    <select id="KitchenQual">
        <option value="Ex">Excellent</option>
        <option value="Gd">Good</option>
        <option value="TA">Typical</option>
    </select>

    <select id="SaleCondition">
        <option value="Normal">Normal</option>
    </select>

    <select id="LandSlope">
        <option value="Gtl">Gentle</option>
        <option value="Mod">Moderate</option>
    </select>

    <button onclick="predictPrice()">
        Predict Price
    </button>

    <h2 id="result"></h2>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
